<script>
    const card = document.getElementById('mainCard');
    const container = document.getElementById('cardContainer');

    function toggleAnimation(e) {
        // ボタン（Instagram/TikTok）やその中身が押された時は無視
        if (e.target.closest('.btn-group')) return;

        // デフォルトの動作（長押しメニューなど）を邪魔しないようにしつつ切り替え
        card.classList.toggle('is-paused');
    }

    // PC用：クリック
    container.addEventListener('click', toggleAnimation);

    // スマホ用：指を離した瞬間に確実に実行させる
    // touchstart（触れた瞬間）だと誤動作しやすいため、touchend（離した瞬間）を使います
    container.addEventListener('touchend', function(e) {
        // クリックイベントとの二重発火を防ぐ
        e.preventDefault(); 
        toggleAnimation(e);
    }, { passive: false });
</script>
