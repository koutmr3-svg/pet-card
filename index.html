<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Lattemaru | Ultra 3D Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* --- 1. 全体設定：スクロール禁止・中央寄せ --- */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh; /* 固定で100%確保 */
            display: flex;
            flex-direction: column;
            justify-content: center; /* 垂直方向中央 */
            align-items: center;     /* 水平方向中央 */
            overflow: hidden;        /* はみ出しをカットしてスッキリさせる */
    
            /* 背景：動くグラデーション（康さんの設定を完全維持） */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
    
            font-family: 'Arial Black', sans-serif;
            color: white;
            text-align: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- 2. ネオンタイトル --- */
        h1 {
            font-size: clamp(2rem, 8vh, 4rem);
            margin-bottom: 2vh;
            text-transform: uppercase;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff00de, 0 0 30px #ff00de;
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* --- 3. 3Dカードの箱（サイズを画面に最適化） --- */
        .card-container {
            width: 250px;
            height: 380px;
            perspective: 1200px;
            margin-bottom: 5vh;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: spinCard 7s linear infinite;
        }

        @keyframes spinCard {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* --- 4. カードの表裏（ガラスモーフィズム） --- */
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .front { transform: rotateY(0deg); }
        .back { transform: rotateY(180deg); }

        .face img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ボタンを横に並べるための入れ物 */
        .btn-group {
         display: flex;
         gap: 15px; /* ボタン同士の隙間 */
         justify-content: center;
         width: 100%;
        }

        /* 共通のボタンパーツ */
        /* 共通のボタンパーツ（サイズ固定版） */
        .btn-common {
         display: inline-flex;     /* 中の文字を中央に寄せる準備 */
         align-items: center;      /* 縦中央 */
         justify-content: center;   /* 横中央 */
    
        width: 140px;             /* ★ボタンの幅を140pxに固定（ここがポイント！） */
        height: 50px;             /* ★高さも揃える */
    
        border-radius: 50px;
        color: white;
        text-decoration: none;
        font-weight: bold;
        font-size: 0.9rem;
        transition: 0.3s;
        animation: pulse 1.5s infinite;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        white-space: nowrap;      /* 文字を折り返さない */
        }

        /* インスタ専用：いつものグラデ */
        .insta-btn {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        /* TikTok専用：黒・青・ピンクのサイバーカラー */
        .tiktok-btn {
            background: #000;
            border: 2px solid #ff0050; /* TikTokピンク */
            box-shadow: 2px 2px 0px #00f2ea; /* TikTok水色の影 */
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        /* スマホ画面のときだけ文字を小さくする設定 */
        @media screen and (max-width: 480px) {
          h1 {
            font-size: 10vw !important; /* 画面幅の10%の大きさに自動調整 */
            white-space: nowrap;       /* 勝手に改行されるのを防ぐ */
          }
        }
    </style>
</head>
<body>

    <h1>Lattemaru</h1>

    <div class="card-container">
        <div class="card">
            <div class="face front">
                <img src="omote.png" alt="FRONT">
            </div>
            <div class="face back">
                <img src="ura.png" alt="BACK">
            </div>
        </div>
    </div>

   <div class="btn-group">
    <a href="https://www.instagram.com/lattemaru_0423" class="btn-common insta-btn">Instagram</a>
    <a href="https://www.tiktok.com/@koutmr3" class="btn-common tiktok-btn">TikTok</a>
</div>
</body>
</html>
